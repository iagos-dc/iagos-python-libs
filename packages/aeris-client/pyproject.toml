[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "aeris-client"
version = "0.1.0"
description = "Python client for AERIS SSO authentication and catalogue REST API"
requires-python = ">=3.10"
dependencies = [
    "requests",
    "python-keycloak",
    "python-dotenv",
    "cryptography",
]

[project.urls]
Homepage = "https://www.aeris-data.fr"
Repository = "https://github.com/iagos-dc/iagos-python-libs"

[project.optional-dependencies]
test = ["pytest", "pytest-mock", "responses"]

[tool.setuptools.packages.find]
where = ["src"]
